<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#0A1F44" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#grid)" />
  
  <!-- World map continents outline -->
  <path d="M200,250 L220,240 L250,245 L280,235 L310,250 L340,245 L370,260 L400,255 L430,270" stroke="#0A1F44" stroke-width="1" opacity="0.2" fill="none"/>
  <path d="M450,280 L480,275 L510,290 L540,285 L570,300 L600,295" stroke="#0A1F44" stroke-width="1" opacity="0.2" fill="none"/>
  <path d="M150,350 L180,345 L210,360 L240,355 L270,370 L300,365" stroke="#0A1F44" stroke-width="1" opacity="0.2" fill="none"/>
  <path d="M650,300 L680,295 L710,310 L740,305 L770,320 L800,315 L830,330" stroke="#0A1F44" stroke-width="1" opacity="0.2" fill="none"/>
  <path d="M850,340 L880,335 L910,350 L940,345 L970,360 L1000,355" stroke="#0A1F44" stroke-width="1" opacity="0.2" fill="none"/>
  
  <!-- Radar circles -->
  <circle cx="300" cy="300" r="80" stroke="#0A1F44" stroke-width="0.5" opacity="0.1" fill="none"/>
  <circle cx="300" cy="300" r="120" stroke="#0A1F44" stroke-width="0.5" opacity="0.08" fill="none"/>
  <circle cx="700" cy="350" r="80" stroke="#0A1F44" stroke-width="0.5" opacity="0.1" fill="none"/>
  <circle cx="700" cy="350" r="120" stroke="#0A1F44" stroke-width="0.5" opacity="0.08" fill="none"/>
  
  <!-- Location markers -->
  <circle cx="300" cy="300" r="3" fill="#D32F2F" opacity="0.3"/>
  <circle cx="500" cy="350" r="3" fill="#FBC02D" opacity="0.3"/>
  <circle cx="700" cy="350" r="3" fill="#2E7D32" opacity="0.3"/>
  <circle cx="900" cy="380" r="3" fill="#D32F2F" opacity="0.3"/>
  
  <!-- Connecting lines -->
  <line x1="300" y1="300" x2="500" y2="350" stroke="#0A1F44" stroke-width="0.5" opacity="0.1" stroke-dasharray="5,5"/>
  <line x1="500" y1="350" x2="700" y2="350" stroke="#0A1F44" stroke-width="0.5" opacity="0.1" stroke-dasharray="5,5"/>
  <line x1="700" y1="350" x2="900" y2="380" stroke="#0A1F44" stroke-width="0.5" opacity="0.1" stroke-dasharray="5,5"/>
</svg>
