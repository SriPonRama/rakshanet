services:
  - type: web
    name: rakshanet
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: mongodb+srv://sriponrama:root@sriponrama.ljyarxj.mongodb.net/rakshanet
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: AI_SERVICE_URL
        value: http://localhost:8000
      - key: PORT
        value: 5000
